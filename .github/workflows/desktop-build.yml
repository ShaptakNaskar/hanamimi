# Desktop test builds for the `desktop` branch: a Windows installer
# (Inno Setup) + portable zip, and a Linux AppImage — uploaded as run
# artifacts, NOT released. The release-grade versions of these jobs
# live in release.yml and fire on plus pushes once desktop merges.
name: desktop-build

on:
  push:
    branches: [desktop]
    paths-ignore: ['**.md', '.gitignore', 'LICENSE']
  workflow_dispatch:

concurrency:
  group: desktop-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          channel: stable
          cache: true

      - name: Build
        run: |
          flutter pub get
          flutter build windows --release --build-name=0.1.0 --build-number=${{ github.run_number }}

      - name: Bundle helper binaries
        shell: pwsh
        run: |
          $release = 'build\windows\x64\runner\Release'
          Invoke-WebRequest 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe' -OutFile "$release\yt-dlp.exe"
          Invoke-WebRequest 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip' -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Force "$env:TEMP\ffmpeg.zip" "$env:TEMP\ffmpeg-x"
          Copy-Item "$env:TEMP\ffmpeg-x\*\bin\ffmpeg.exe" $release
          Copy-Item "$env:TEMP\ffmpeg-x\*\bin\ffprobe.exe" $release
          Copy-Item 'packaging\windows\test-smtc.ps1' $release
          Copy-Item 'packaging\windows\TESTING.md' $release

      - name: Compile installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DAppVersion=0.1.0 `
            /O"dist" packaging\windows\hanamimi.iss

      - uses: actions/upload-artifact@v4
        with:
          name: hanamimi-plus-setup
          path: dist/hanamimi-plus-setup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: hanamimi-plus-windows-portable
          path: build/windows/x64/runner/Release

  linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          channel: stable
          cache: true

      - name: Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Build
        run: |
          flutter pub get
          flutter build linux --release

      - name: Package AppImage
        env:
          # Runners lack FUSE2; appimagetool self-extracts instead.
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          packaging/linux/make_appimage.sh \
            build/linux/x64/release/bundle \
            Hanamimi-plus-x86_64.AppImage

      - name: Package pacman tar.zst
        run: |
          sudo apt-get install -y libarchive-tools zstd
          packaging/linux/make_archpkg.sh \
            build/linux/x64/release/bundle 0.1.0 dist

      - uses: actions/upload-artifact@v4
        with:
          name: hanamimi-plus-appimage
          path: Hanamimi-plus-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: hanamimi-plus-pacman
          path: dist/*.pkg.tar.zst
