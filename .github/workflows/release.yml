# Hanamimi release pipeline.
#
# Every push to main/plus builds signed release APKs (per-ABI + universal),
# writes AI patch notes from the commit (Groq; falls back to the raw
# commit message), publishes a GitHub Release tagged <branch>-v<version>,
# and posts the arm64 APK to Telegram when bot secrets are configured.
#
# Versioning: versionCode = the workflow run number (monotonic across
# both branches), versionName = <pubspec version>-<branch>.<run>.
# The in-app update checker compares run numbers per branch tag prefix.
#
# Required repo secrets:
#   KEYSTORE_BASE64     — base64 of sappy-release.jks
#   KEYSTORE_PASSWORD   — store password
#   KEY_ALIAS           — key alias (sappy-release)
#   KEY_PASSWORD        — key password
# Optional:
#   GROQ_API_KEY        — enables AI-generated patch notes
#   TELEGRAM_BOT_TOKEN  — enables the Telegram post
#   TELEGRAM_CHAT_ID    — chat/channel id for the bot

name: release

on:
  push:
    branches: [main, plus]
    # Don't spend a full signed build on doc/ignore-only pushes.
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write # create releases + tags

jobs:
  build-release:
    runs-on: ubuntu-latest
    # Desktop jobs below attach their artifacts to the release this
    # job creates (M31 — plus ships APKs + AppImage + Windows setup).
    outputs:
      semver: ${{ steps.ver.outputs.semver }}
      code: ${{ steps.ver.outputs.code }}
      tag: ${{ steps.ver.outputs.tag }}
      display: ${{ steps.ver.outputs.display }}
      notes: ${{ steps.notes.outputs.notes }}
      difflink: ${{ steps.notes.outputs.difflink }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # HEAD + parent for the changelog diff

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          channel: stable
          cache: true

      - name: Restore signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p android/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore/release.jks
          cat > android/key.properties <<EOF
          storeFile=../keystore/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Compute version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          RUN="${{ github.run_number }}"
          # major.minor is the ONLY part you edit by hand in pubspec.yaml.
          # The patch auto-increments per release of that minor: pushes go
          # 1.0.1, 1.0.2, … and start again at x.y.1 when you bump the
          # major/minor (e.g. to 1.1.0). versionCode stays the global run
          # number so the in-app updater's "newer" check is monotonic.
          MM=$(grep '^version:' pubspec.yaml | sed 's/version: *//; s/+.*//' | cut -d. -f1,2)
          # Count TAGS, not releases: old releases get pruned (below) and can
          # be deleted by hand, which would reset the count and hand out an
          # already-used version. Tags are permanent.
          COUNT=$(gh api "repos/${{ github.repository }}/tags?per_page=100" --paginate \
            --jq "[.[] | select(.name | startswith(\"${BRANCH}-v${MM}.\"))] | length" 2>/dev/null || echo 0)
          PATCH=$((COUNT + 1))
          SEMVER="${MM}.${PATCH}"
          EDITION=$([ "$BRANCH" = "plus" ] && echo "Hanamimi+" || echo "Hanamimi")
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "code=${RUN}" >> "$GITHUB_OUTPUT"
          echo "tag=${BRANCH}-v${SEMVER}-${RUN}" >> "$GITHUB_OUTPUT"
          echo "display=${EDITION} ${SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Build APKs (per-ABI + universal)
        run: |
          flutter pub get
          flutter build apk --release \
            --build-name="${{ steps.ver.outputs.semver }}" \
            --build-number="${{ steps.ver.outputs.code }}" \
            --split-per-abi
          flutter build apk --release \
            --build-name="${{ steps.ver.outputs.semver }}" \
            --build-number="${{ steps.ver.outputs.code }}"
          cd build/app/outputs/flutter-apk
          BRANCH="${{ github.ref_name }}"
          for f in app-*-release.apk; do
            abi=$(echo "$f" | sed 's/app-//; s/-release.apk//')
            mv "$f" "hanamimi-${BRANCH}-${abi}.apk"
          done
          mv app-release.apk "hanamimi-${BRANCH}-universal.apk"
          ls -la

      - name: Generate patch notes
        id: notes
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s%n%n%b')
          DIFF=$( (git diff HEAD~1 --stat; git diff HEAD~1 | head -c 6000) 2>/dev/null || echo "(no diff available)")
          NOTES=""
          if [ -n "$GROQ_API_KEY" ]; then
            BODY=$(jq -n \
              --arg msg "$COMMIT_MSG" --arg diff "$DIFF" \
              '{model: "openai/gpt-oss-120b",
                temperature: 0.3,
                messages: [
                  {role: "system", content: "You write short, user-facing release notes for a music player app called Hanamimi. Output only markdown bullet points (3-8 bullets), no heading, no preamble. Describe what changed for USERS; skip refactors and internal chores unless user-visible."},
                  {role: "user", content: ("Commit message:\n" + $msg + "\n\nDiff:\n" + $diff)}
                ]}')
            NOTES=$(curl -sS --max-time 60 \
              -H "Authorization: Bearer $GROQ_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              https://api.groq.com/openai/v1/chat/completions \
              | jq -r '.choices[0].message.content // empty' || true)
          fi
          if [ -z "$NOTES" ]; then
            # Fallback: the raw commit title + description as patch notes.
            NOTES="$COMMIT_MSG"
          fi
          # Every release links the editions explainer so folks browsing
          # main vs plus builds know what the difference is.
          DIFF_LINK="ℹ️ Hanamimi vs Hanamimi+ → https://github.com/${{ github.repository }}/blob/main/docs/EDITIONS.md"
          # GitHub release body (no length limit): changelog + link, to a file.
          { printf '%s\n\n%s\n' "$NOTES" "$DIFF_LINK"; } > release_body.md
          # Outputs for the Telegram step: changelog and link kept apart so
          # the caption can truncate the body but always keep the link.
          {
            echo 'notes<<NOTES_EOF'; echo "$NOTES"; echo 'NOTES_EOF'
            echo "difflink=$DIFF_LINK"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.display }}
          body_path: release_body.md
          files: build/app/outputs/flutter-apk/hanamimi-*.apk
          # The releases page sorts by the tagged COMMIT's date, so commits
          # committed long before they're pushed scramble the order. Forcing
          # the badge keeps "Latest" on the newest publish regardless.
          make_latest: true

      # Keep the releases page short and ordered: only the newest 3 releases
      # per edition stay up. Tags are kept (versioning counts them; git
      # history stays browsable) — only the release entries go.
      - name: Prune old releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          gh api "repos/${{ github.repository }}/releases?per_page=100" --paginate \
            --jq ".[] | select(.tag_name | startswith(\"${BRANCH}-v\")) | \"\(.published_at) \(.id)\"" \
            | sort -r | tail -n +4 | awk '{print $2}' \
            | while read -r id; do
                gh api -X DELETE "repos/${{ github.repository }}/releases/$id" || true
              done

      - name: Post to Telegram (main edition)
        if: ${{ github.ref_name == 'main' && env.BOT != '' && env.CHAT != '' }}
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTES: ${{ steps.notes.outputs.notes }}
          DIFFLINK: ${{ steps.notes.outputs.difflink }}
        run: |
          # Groq emits markdown, which Telegram shows literally in a
          # plain-text caption. Turn leading '*'/'-' bullets into real
          # bullet dots and strip inline **bold**/__underline__/`code`
          # markers so the changelog reads cleanly.
          NOTES=$(printf '%s' "$NOTES" \
            | sed -E 's/^[[:space:]]*[*-][[:space:]]+/• /' \
            | sed -E 's/\*\*//g; s/__//g; s/`//g; s/^#+[[:space:]]*//')
          # Reserve room for the diff link (~110 chars) under Telegram's
          # 1024-char cap, so it survives even a long changelog.
          NOTES=$(printf '%s' "$NOTES" | head -c 800)
          CAPTION="🌸 ${{ steps.ver.outputs.display }}

          ${NOTES}

          ${DIFFLINK}"
          curl -sS --max-time 300 \
            -F chat_id="$CHAT" \
            -F document=@"build/app/outputs/flutter-apk/hanamimi-${{ github.ref_name }}-arm64-v8a.apk" \
            -F caption="$CAPTION" \
            "https://api.telegram.org/bot${BOT}/sendDocument" >/dev/null
          echo "sent"

  # --- Desktop builds (M31, plus edition only) -------------------------
  # Both attach to the release build-release just published, so one plus
  # push ships APKs + Windows installer + Linux AppImage together. The
  # in-app desktop updater looks for 'setup.exe' / '.AppImage' assets.

  build-windows:
    if: github.ref_name == 'plus'
    needs: build-release
    runs-on: windows-2022 # windows-latest (2025 image) breaks Flutter 3.29 VS detection
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          channel: stable
          cache: true

      - name: Build
        run: |
          flutter pub get
          flutter build windows --release --build-name=${{ needs.build-release.outputs.semver }} --build-number=${{ needs.build-release.outputs.code }}

      # Slim on purpose: the app self-fetches yt-dlp and ffmpeg on first
      # run (DesktopBinaries), and Telegram bots cap uploads at 50 MB.
      - name: Compile installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ needs.build-release.outputs.semver }} `
            /O"dist" packaging\windows\hanamimi.iss

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-release.outputs.tag }}
          files: dist/hanamimi-plus-setup.exe

  build-linux:
    if: github.ref_name == 'plus'
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          channel: stable
          cache: true

      - name: Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Build
        run: |
          flutter pub get
          flutter build linux --release

      - name: Package AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1' # runners lack FUSE2
        run: |
          packaging/linux/make_appimage.sh \
            build/linux/x64/release/bundle \
            Hanamimi-plus-x86_64.AppImage

      - name: Package pacman tar.zst
        run: |
          sudo apt-get install -y libarchive-tools zstd
          packaging/linux/make_archpkg.sh \
            build/linux/x64/release/bundle \
            ${{ needs.build-release.outputs.semver }} dist

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-release.outputs.tag }}
          files: |
            Hanamimi-plus-x86_64.AppImage
            dist/*.pkg.tar.zst


  # One Telegram drop per plus release: APK + Windows installer +
  # AppImage (with the main run's APK that makes the full set of four).
  # All three stay under the Bot API's 50 MB document cap — that's WHY
  # the desktop artifacts ship slim and self-fetch ffmpeg/yt-dlp.
  post-telegram-plus:
    if: github.ref_name == 'plus'
    needs: [build-release, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download '${{ needs.build-release.outputs.tag }}' \
            --repo '${{ github.repository }}' \
            -p 'hanamimi-plus-arm64-v8a.apk' \
            -p 'hanamimi-plus-setup.exe' \
            -p 'Hanamimi-plus-x86_64.AppImage'
          ls -la

      - name: Post to Telegram
        if: ${{ env.BOT != '' && env.CHAT != '' }}
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTES: ${{ needs.build-release.outputs.notes }}
          DIFFLINK: ${{ needs.build-release.outputs.difflink }}
          DISPLAY: ${{ needs.build-release.outputs.display }}
        run: |
          NOTES=$(printf '%s' "$NOTES" \
            | sed -E 's/^[[:space:]]*[*-][[:space:]]+/• /' \
            | sed -E 's/\*\*//g; s/__//g; s/`//g; s/^#+[[:space:]]*//')
          NOTES=$(printf '%s' "$NOTES" | head -c 700)
          send() { # file, caption
            curl -sS --max-time 300 \
              -F chat_id="$CHAT" \
              -F document=@"$1" \
              -F caption="$2" \
              "https://api.telegram.org/bot${BOT}/sendDocument" >/dev/null \
              && echo "sent $1" || echo "FAILED $1"
          }
          send hanamimi-plus-arm64-v8a.apk "🌸 ${DISPLAY} — Android

          ${NOTES}

          ${DIFFLINK}"
          send hanamimi-plus-setup.exe "🖥️ ${DISPLAY} — Windows installer"
          send Hanamimi-plus-x86_64.AppImage "🐧 ${DISPLAY} — Linux AppImage (chmod +x and run)"
