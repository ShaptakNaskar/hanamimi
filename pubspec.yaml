name: hanamimi
description: "Hanamimi web — the kawaii player, demonstrated in a browser tab."
publish_to: 'none'

# Web edition: version is cosmetic (updates are a redeploy).
version: 3.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  shared_preferences: ^2.5.3
  just_audio: ^0.10.6 # web backend: HTML5 audio over blob URLs
  audio_service: ^0.18.19 # web backend: Media Session API (media keys)
  rxdart: ^0.28.0
  http: ^1.6.0 # LRCLIB lyrics
  url_launcher: ^6.3.1 # GitHub plug + maker links in About
  file_selector: ^1.0.3 # multi-file picker fallback (Firefox/Safari)
  web: ^1.1.0 # FS Access API, Web Audio decode, wake lock

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    # oneko sprite sheet — the cat asleep beside the edition logo.
    - assets/oneko/oneko.png

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-400.ttf
          weight: 400
        - asset: assets/fonts/Nunito-600.ttf
          weight: 600
        - asset: assets/fonts/Nunito-700.ttf
          weight: 700
        - asset: assets/fonts/Nunito-800.ttf
          weight: 800
