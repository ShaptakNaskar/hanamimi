name: hanamimi
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 3.0.0 # only major.minor matters — CI auto-increments the patch per release

environment:
  sdk: ^3.7.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  permission_handler: ^12.0.3
  sqflite: ^2.4.2
  shared_preferences: ^2.5.3
  just_audio: ^0.10.6
  audio_service: ^0.18.19
  audio_session: ^0.2.2 # single focus owner; engine reacts to call interruptions
  rxdart: ^0.28.0
  http: ^1.6.0
  screen_brightness: ^2.1.11
  youtube_explode_dart: ^3.1.0
  path_provider: ^2.1.5
  pointycastle: ^4.0.0
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.3.0 # current versionCode for the update checker
  url_launcher: ^6.3.1 # maker links in About
  image_picker: ^1.2.1 # custom playlist covers (Android Photo Picker)
  share_plus: ^12.0.1 # lyrics cards

  # --- Tier 3 YT Music sign-in (M41) — see ARCHITECTURE-RECOMMENDATIONS.md ---
  flutter_inappwebview: ^6.1.5 # cookie login WebView (Android); tweaked UA
  crypto: ^3.0.6 # SAPISIDHASH (SHA-1) for authenticated Innertube
  # Cookie is encrypted at rest with pointycastle AES (already a dep) —
  # flutter_secure_storage's Linux plugin bundles a json.hpp that newer
  # clang rejects, breaking the desktop build.

  # --- Desktop (M31) — see ARCHITECTURE-DESKTOP.md ---
  media_kit: ^1.1.11 # libmpv playback engine (Linux/Windows)
  media_kit_libs_linux: ^1.2.1 # bundles libmpv into the Linux build
  media_kit_libs_windows_audio: ^1.0.9 # …and the Windows build
  sqflite_common_ffi: ^2.3.4 # same SQL, desktop-native SQLite backend
  window_manager: ^0.4.3 # min size, remembered bounds, window title
  file_selector: ^1.0.3 # folder picker (music folders) + cover picker stand-in
  dbus: ^0.7.10 # MPRIS media keys / now-playing on Linux
  smtc_windows: ^1.1.0
  gamepads: ^0.1.7
  device_info_plus: ^12.4.0 # device make/model for the opt-in stats leaderboard
  archive: ^4.0.9

# smtc_windows 1.1.0 ships Rust code generated with flutter_rust_bridge
# 2.11.1 but allows ^2.11.1, and the 2.12.0 runtime pub picks refuses a
# codegen-version mismatch at init ("Bad state: codegen version ...").
# Pin the runtime to the codegen version until smtc_windows regenerates.
dependency_overrides:
  flutter_rust_bridge: 2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    # Bundled so the desktop runner can set the window icon at runtime
    # (X11/dev runs; Wayland reads the .desktop file instead).
    - assets/icon/icon.png
    # oneko sprite sheet — the cursor-chasing cat on desktop.
    - assets/oneko/oneko.png

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-400.ttf
          weight: 400
        - asset: assets/fonts/Nunito-600.ttf
          weight: 600
        - asset: assets/fonts/Nunito-700.ttf
          weight: 700
        - asset: assets/fonts/Nunito-800.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#F4A7B9"
  adaptive_icon_foreground: assets/icon/icon_foreground.png
